name: Multilanguage-sentiment-analusis
 

on:
  push:
    branches:
        - main

jobs:
    build:
      runs-on: ubuntu-latest


      steps:
        - name: checking codes
          uses: actions/checkout@v4

        - name: stuping python
          uses: actions/checkout@v4
          with:
            python-version: "3.10"
        
        - name: installing dependecies
          run: |
            python -m pip install --upgrade pip
            pip install -r Multilang-sentiment-analysis/requirments.txt
        
        - name: building docker image
          run: |
            ]docker build -t ${{secrets.DOCKER_USERNAME}}/Multilang-sentimet-app Multilang-sentiment-analysis/dockerfile

        - name: checking required secrets keys
          run: |
            if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then echo "Missing DOCKER_USERNAME" && exit 1; fi
            if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then echo "Missing DOCKERHUB_TOKEN " && exit 1; fi

        - name: login in docker hub
          uses: docker/login-action@v2
          with:
            username: ${{secrets.DOCKER_USERNAME}}
            password: ${{secrets.DOCKER_TOKEN}}
        
        - name: taging & pusing image
          run: |
            docker push ${{secrets.DOCKER_USERNAME}}/Multilang-sentiment-app:latest
        